name: Test Code

on:
  pull_request:
  push:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup node ⛺️
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install 🔧
        run: npm ci

      - name: Test 🧪
        run: npm test
