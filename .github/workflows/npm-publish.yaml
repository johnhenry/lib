name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "js/**/package.json"
  workflow_dispatch:

permissions:
  id-token: write # provenance attestation
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup node ⛺️
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish eligible packages 🚀
        run: node scripts/npm-publish-eligible.mjs --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
